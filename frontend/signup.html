<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forge3D – Create Account</title>
<meta name="description" content="Create your Forge3D account and start managing 3D assets with professional-grade pipelines."/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "surface-container": "#201f1f", "surface-container-low": "#1c1b1b",
        "primary-container": "#4d8eff", "surface-container-high": "#2a2a2a",
        "surface-container-highest": "#353534", "surface-container-lowest": "#0e0e0e",
        "primary": "#adc6ff", "on-surface": "#e5e2e1", "outline-variant": "#424754",
        "surface-variant": "#353534", "on-tertiary-fixed": "#1b1c1c",
        "on-background": "#e5e2e1", "outline": "#8c909f", "on-surface-variant": "#c2c6d6",
        "surface-dim": "#131313", "background": "#131313", "surface": "#131313",
        "on-primary-container": "#00285d",
      },
      borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      spacing: { "md": "16px", "xs": "4px", "lg": "24px", "xl": "32px", "sm": "8px", "base": "8px", "gutter": "16px" },
      fontFamily: { "body-sm": ["Inter"], "label-sm": ["Inter"], "body-md": ["Inter"], "label-md": ["Inter"], "code": ["monospace"], "h1": ["Inter"], "h2": ["Inter"], "h3": ["Inter"] },
      fontSize: {
        "body-sm":  ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
        "label-sm": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "600"}],
        "body-md":  ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
        "h1":       ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
        "h3":       ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
        "code":     ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #121212; color: #e5e2e1; min-height: max(884px, 100dvh); }
  .signup-canvas { background-image: radial-gradient(circle at 2px 2px, #1e1e1e 1px, transparent 0); background-size: 32px 32px; }
  .shake { animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
</style>
</head>
<body class="font-body-md text-on-background selection:bg-primary/30">
<main class="signup-canvas min-h-screen flex items-center justify-center p-md">
  <div class="w-full max-w-[400px] flex flex-col gap-xl">

    <!-- Header -->
    <div class="flex flex-col items-center gap-sm mb-lg">
      <div class="mb-sm">
        <span class="material-symbols-outlined text-blue-500 !text-[48px]">deployed_code</span>
      </div>
      <h1 class="font-h1 text-h1 tracking-tighter text-blue-500 uppercase">Forge3D</h1>
      <h2 class="font-h1 text-h2 text-on-surface text-center mt-md">Create Account</h2>
      <p class="font-body-md text-body-md text-on-surface-variant text-center px-lg">Start managing your 3D assets with professional-grade pipelines.</p>
    </div>

    <!-- Error banner -->
    <div id="error-banner" class="hidden bg-red-900/40 border border-red-700/50 text-red-300 px-md py-sm font-body-sm text-body-sm flex items-center gap-sm">
      <span class="material-symbols-outlined text-sm">error</span>
      <span id="error-msg"></span>
    </div>

    <!-- Form Card -->
    <div class="bg-surface-container border border-outline-variant p-xl shadow-sm">
      <form id="signup-form" class="flex flex-col gap-lg" novalidate>
        <!-- Full Name -->
        <div class="flex flex-col gap-xs">
          <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="name">Full Name</label>
          <input class="w-full h-10 bg-surface-container-lowest border border-outline-variant text-on-surface px-md font-body-md focus:border-primary-container focus:ring-0 outline-none transition-colors placeholder:text-outline-variant"
            id="name" placeholder="John Doe" type="text" autocomplete="name"/>
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-xs">
          <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
          <input class="w-full h-10 bg-surface-container-lowest border border-outline-variant text-on-surface px-md font-body-md focus:border-primary-container focus:ring-0 outline-none transition-colors placeholder:text-outline-variant"
            id="email" placeholder="john.doe@studio.com" type="email" required autocomplete="email"/>
        </div>

        <!-- Password -->
        <div class="flex flex-col gap-xs">
          <label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
          <input class="w-full h-10 bg-surface-container-lowest border border-outline-variant text-on-surface px-md font-body-md focus:border-primary-container focus:ring-0 outline-none transition-colors placeholder:text-outline-variant"
            id="password" placeholder="Min. 8 characters" type="password" required autocomplete="new-password"/>
        </div>

        <!-- Terms -->
        <div class="flex items-start gap-sm py-xs">
          <div class="flex items-center h-5">
            <input class="h-4 w-4 rounded-sm bg-surface-container-lowest border-outline-variant text-primary-container focus:ring-0 cursor-pointer"
              id="terms" type="checkbox" required/>
          </div>
          <label class="font-label-md text-label-md text-on-surface-variant select-none cursor-pointer" for="terms">
            I agree to the <a class="text-primary hover:underline transition-all" href="#">Terms of Service</a> and <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>.
          </label>
        </div>

        <!-- Submit -->
        <button id="signup-btn" class="w-full h-10 bg-primary-container text-on-primary-container font-h3 text-h3 flex items-center justify-center gap-sm hover:opacity-90 active:scale-[0.98] transition-all disabled:opacity-60 disabled:cursor-not-allowed" type="submit">
          <span id="btn-text">Create Account</span>
          <span id="btn-spinner" class="hidden material-symbols-outlined animate-spin !text-base">progress_activity</span>
        </button>
      </form>

      <div class="mt-xl pt-lg border-t border-outline-variant/30 flex flex-col items-center gap-md">
        <p class="font-body-sm text-body-sm text-on-surface-variant">
          Already have an account?
          <a class="text-primary font-semibold hover:underline transition-all" href="login.html">Log in instead</a>
        </p>
      </div>
    </div>

    <!-- Trust badges -->
    <div class="flex justify-center gap-lg">
      <div class="flex items-center gap-xs opacity-40 hover:opacity-100 cursor-help transition-opacity">
        <span class="material-symbols-outlined text-[16px]">lock</span>
        <span class="font-label-sm text-label-sm uppercase">256-bit AES</span>
      </div>
      <div class="flex items-center gap-xs opacity-40 hover:opacity-100 cursor-help transition-opacity">
        <span class="material-symbols-outlined text-[16px]">verified_user</span>
        <span class="font-label-sm text-label-sm uppercase">Secure Cloud</span>
      </div>
    </div>
  </div>
</main>

<script type="module">
  if (localStorage.getItem("forge3d_token")) {
    window.location.href = "dashboard.html";
  }

  const API_BASE = window.FORGE3D_API_BASE || "http://localhost:5000/api";
  const form     = document.getElementById("signup-form");
  const btn      = document.getElementById("signup-btn");
  const btnText  = document.getElementById("btn-text");
  const spinner  = document.getElementById("btn-spinner");
  const errBanner= document.getElementById("error-banner");
  const errMsg   = document.getElementById("error-msg");

  function showError(msg) {
    errMsg.textContent = msg;
    errBanner.classList.remove("hidden");
    form.classList.add("shake");
    setTimeout(() => form.classList.remove("shake"), 500);
  }

  function setLoading(loading) {
    btn.disabled = loading;
    btnText.textContent = loading ? "Creating account…" : "Create Account";
    spinner.classList.toggle("hidden", !loading);
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errBanner.classList.add("hidden");

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const terms    = document.getElementById("terms").checked;

    if (!email)    return showError("Email is required.");
    if (!password) return showError("Password is required.");
    if (password.length < 8) return showError("Password must be at least 8 characters.");
    if (!terms)    return showError("You must accept the Terms of Service.");

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/signup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Signup failed.");

      localStorage.setItem("forge3d_token", data.token);
      localStorage.setItem("forge3d_user", JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
